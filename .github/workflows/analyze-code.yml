name: Refresh telemetry

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  telemetry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq cloc curl

      - name: Restore repos cache
        uses: actions/cache@v4
        with:
          path: repos
          key: telemetry-repos-${{ github.run_id }}
          restore-keys: |
            telemetry-repos-

      - name: Fetch or update repositories
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_USERNAME: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          mkdir -p repos/public repos/private

          cursor="null"
          while : ; do
            response=$(curl -s -H "Authorization: bearer ${GH_PAT}" -H "Content-Type: application/json" \
              -d "{\"query\":\"query(\$cursor: String) { user(login: \\\"${GH_USERNAME}\\\") { repositories(first: 50, after: \$cursor, ownerAffiliations: OWNER, isFork: false) { pageInfo { hasNextPage endCursor } nodes { name isPrivate nameWithOwner } } } }\",\"variables\":{\"cursor\": ${cursor}}}" \
              https://api.github.com/graphql)

            echo "$response" | jq -e '.data.user.repositories.nodes' > /dev/null || { echo "$response"; exit 1; }

            echo "$response" | jq -c '.data.user.repositories.nodes[]' | while read -r node; do
              name=$(echo "$node" | jq -r '.name')
              is_private=$(echo "$node" | jq -r '.isPrivate')
              full_name=$(echo "$node" | jq -r '.nameWithOwner')
              if [ "$is_private" = "true" ]; then
                dest="repos/private/${name}"
              else
                dest="repos/public/${name}"
              fi
              url="https://x-access-token:${GH_PAT}@github.com/${full_name}.git"
              if [ -d "${dest}/.git" ]; then
                git -C "${dest}" fetch --quiet origin || true
                default_branch=$(git -C "${dest}" remote show origin | sed -n '/HEAD branch/s/.*: //p')
                git -C "${dest}" checkout --quiet "${default_branch}" || true
                git -C "${dest}" reset --quiet --hard "origin/${default_branch}" || true
              else
                git clone --quiet "${url}" "${dest}" || true
              fi
            done

            has_next=$(echo "$response" | jq -r '.data.user.repositories.pageInfo.hasNextPage')
            if [ "$has_next" != "true" ]; then
              break
            fi
            end_cursor=$(echo "$response" | jq -r '.data.user.repositories.pageInfo.endCursor')
            cursor="\"${end_cursor}\""
          done

      - name: Count lines of code
        run: |
          set -euo pipefail
          EXCLUDE_DIRS="node_modules,.git,dist,build,vendor,.venv,venv,__pycache__,target"
          if [ -n "$(ls -A repos/public 2>/dev/null)" ]; then
            cloc repos/public --json --exclude-dir="$EXCLUDE_DIRS" > cloc-public.json
          else
            echo '{}' > cloc-public.json
          fi
          if [ -n "$(ls -A repos/private 2>/dev/null)" ]; then
            cloc repos/private --json --exclude-dir="$EXCLUDE_DIRS" > cloc-private.json
          else
            echo '{}' > cloc-private.json
          fi

      - name: Compute code churn
        env:
          AUTHOR_FILTER: ${{ secrets.AUTHOR_FILTER }}
        run: |
          set -euo pipefail
          for visibility in public private; do
            for period in week all; do
              additions=0
              deletions=0
              for repo in repos/${visibility}/*/; do
                [ -d "${repo}/.git" ] || continue
                if [ "$period" = "week" ]; then
                  range_args=(--since="7 days ago")
                else
                  range_args=()
                fi
                if [ -n "${AUTHOR_FILTER:-}" ]; then
                  author_args=(--author="${AUTHOR_FILTER}")
                else
                  author_args=()
                fi
                while read -r added removed _; do
                  [[ "$added" =~ ^[0-9]+$ ]] || continue
                  [[ "$removed" =~ ^[0-9]+$ ]] || continue
                  additions=$((additions + added))
                  deletions=$((deletions + removed))
                done < <(git -C "$repo" log "${range_args[@]}" "${author_args[@]}" --numstat --pretty=tformat: 2>/dev/null || true)
              done
              jq -n --argjson additions "$additions" --argjson deletions "$deletions" \
                '{additions: $additions, deletions: $deletions}' > "churn-${visibility}-${period}.json"
            done
          done

      - name: Build telemetry block
        env:
          AUTHOR_FILTER: ${{ secrets.AUTHOR_FILTER }}
        run: python3 build_readme.py

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3 4 5; do
            git add README.md
            if git diff --cached --quiet; then
              echo "No changes to commit."
              break
            fi
            git commit -m "chore: refresh telemetry"
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then
              break
            fi
            sleep 5
          done
